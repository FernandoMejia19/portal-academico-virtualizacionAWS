<div class="container">

  <header class="hero">
  <h1>Portal Académico</h1>
  <p class="subtitle">Gestión de usuarios y recursos multimedia</p>

  <div class="authors">
    <h2>Desarrollado por</h2>
    <div class="author-list">
      <h3>Angélica Panamá</h3>
      <h3>Fernando Mejía</h3>
    </div>
  </div>
</header>

  <!-- Usuarios -->
  <section class="card">
    <h2>Registrar Usuario</h2>

    <input
      type="text"
      placeholder="Nombre"
      [(ngModel)]="nuevoUsuario.name"
    >

    <input
      type="email"
      placeholder="Correo electrónico"
      [(ngModel)]="nuevoUsuario.email"
    >

    <button (click)="crearUsuario()">
      Crear Usuario
    </button>
  </section>

  <!-- Recursos -->
  <section class="card">
    <h2>Registrar Recurso</h2>

    <input
      type="text"
      placeholder="Título"
      [(ngModel)]="nuevoRecurso.title"
    >

    <input
      type="text"
      placeholder="Descripción"
      [(ngModel)]="nuevoRecurso.description"
    >

    <input
      type="text"
      placeholder="Tipo (video, pdf, imagen)"
      [(ngModel)]="nuevoRecurso.resource_type"
    >

    <input
      type="text"
      placeholder="URL"
      [(ngModel)]="nuevoRecurso.url"
    >

    <input
      type="number"
      placeholder="ID Usuario"
      [(ngModel)]="nuevoRecurso.user_id"
    >

    <button (click)="crearRecurso()">
      Crear Recurso
    </button>
  </section>

  <!-- Lista -->
  <section class="card">
    <h2>Recursos Registrados</h2>

    <button (click)="cargarRecursos()">
      Actualizar Lista
    </button>

    <div
      class="resource"
      *ngFor="let recurso of recursos"
    >
      <h3>{{ recurso.title }}</h3>

      <p>{{ recurso.description }}</p>

      <span>
        Tipo: {{ recurso.resource_type }}
      </span>

      <span>
        Autor: {{ recurso.author }}
      </span>

      <a [href]="recurso.url" target="_blank">
        Abrir recurso
      </a>
    </div>

  </section>

</div>
